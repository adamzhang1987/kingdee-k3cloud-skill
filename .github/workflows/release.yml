name: Release Skill

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Package skill
        run: cd kingdee-k3cloud && zip -r ../kingdee-k3cloud.skill .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: kingdee-k3cloud.skill
          generate_release_notes: true
