name: Release Skill

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package skill
        run: cd kingdee && zip -r ../kingdee.skill .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: kingdee.skill
          generate_release_notes: true
