name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate registry.json
        run: python3 -c "import json, sys; json.load(open('registry.json')); print('registry.json is valid')"

      - name: Check required files exist
        run: |
          files=(
            "kingdee-k3cloud/SKILL.md"
            "kingdee-k3cloud/references/verified-fields.md"
            "kingdee-k3cloud/references/common-errors.md"
          )
          for f in "${files[@]}"; do
            [ -f "$f" ] && echo "✓ $f" || { echo "✗ missing: $f"; exit 1; }
          done

      - name: Validate registry.json schema
        run: |
          python3 - <<'EOF'
          import json, os, re, sys
          d = json.load(open('registry.json'))
          required = {'name', 'displayName', 'description', 'repo', 'path', 'version',
                      'category', 'tags', 'author', 'license', 'language'}
          missing = required - d.keys()
          assert not missing, f'registry.json missing keys: {missing}'
          assert os.path.isdir(d['path']), f"path '{d['path']}' does not exist"
          assert re.match(r'^\d+\.\d+\.\d+$', d['version']), f"version '{d['version']}' not semver"
          assert isinstance(d['tags'], list) and d['tags'], 'tags must be non-empty list'
          print('registry.json schema OK')
          EOF

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude-mail './**/*.md'
          fail: true
